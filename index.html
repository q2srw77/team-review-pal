  <script>
    (function () {
      try {
        var d = document.documentElement;
        var ls = window.localStorage;
        var theme = null;
        var lastUid = ls.getItem('theme-last-user-id');
        if (lastUid) theme = ls.getItem('theme-preference:' + lastUid);
        if (theme !== 'light' && theme !== 'dark') theme = ls.getItem('theme-preference:anon');
        if (theme !== 'light' && theme !== 'dark') theme = ls.getItem('app-default-theme');
        if (theme !== 'light' && theme !== 'dark') {
          theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        if (theme === 'dark') d.classList.add('dark');
        d.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>
